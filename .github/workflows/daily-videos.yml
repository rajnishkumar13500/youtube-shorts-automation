name: Daily Video Automation

on:
  # Schedule 3 videos per day (India IST timezone)
  schedule:
    # 6:00 AM IST = 12:30 AM UTC
    - cron: '30 0 * * *'
    # 4:00 PM IST = 10:30 AM UTC
    - cron: '30 10 * * *'
    # 8:30 PM IST = 3:00 PM UTC
    - cron: '0 15 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic (leave empty to use Google Sheets)'
        required: false
        type: string
      duration:
        description: 'Video duration in seconds'
        required: false
        default: '20'
        type: string

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install openai-whisper
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_2=${{ secrets.ELEVENLABS_API_KEY_2 }}
          ELEVENLABS_API_KEY_3=${{ secrets.ELEVENLABS_API_KEY_3 }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUBTITLE_DELAY=0.3
          GOOGLE_SHEETS_CREDENTIALS=google_sheets_credentials.json
          GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}
          YOUTUBE_CLIENT_SECRETS=youtube_client_secrets.json
          EOF
      
      - name: Create Google Sheets credentials
        run: |
          echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}' > google_sheets_credentials.json
      
      - name: Create YouTube client secrets
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > youtube_client_secrets.json
      
      - name: Restore YouTube token
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN }}' | base64 -d > youtube_token.pickle
      
      - name: Create output directories
        run: |
          mkdir -p output/audio output/images output/logs
      
      - name: Generate and upload video
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            # Manual trigger with specific topic
            python main.py "${{ github.event.inputs.topic }}" --duration ${{ github.event.inputs.duration }}
            
            # Upload to YouTube with SEO-friendly title
            python -c "
          from youtube_uploader import YouTubeUploader
          
          topic = '${{ github.event.inputs.topic }}'
          topic_title = topic.title()
          emoji = '💪'
          topic_lower = topic.lower()
          if 'water' in topic_lower or 'drink' in topic_lower:
              emoji = '💧'
          elif 'yoga' in topic_lower or 'meditation' in topic_lower:
              emoji = '🧘'
          elif 'weight' in topic_lower or 'loss' in topic_lower:
              emoji = '🔥'
          
          title = f\"{topic_title} {emoji} #Shorts #Health\"
          if len(title) > 100:
              max_len = 100 - len(f\" {emoji} #Shorts #Health\")
              topic_title = topic_title[:max_len].rsplit(' ', 1)[0]
              title = f\"{topic_title} {emoji} #Shorts #Health\"
          
          uploader = YouTubeUploader(client_secrets_file='youtube_client_secrets.json')
          result = uploader.upload_video(
              video_path='output/final_video_final.mp4',
              title=title,
              description='Amazing health tips!\n\n🔔 Subscribe for more!\n\n#Shorts #Health #Fitness',
              tags=['shorts', 'health', 'fitness', 'wellness'],
              category_id='22',
              privacy_status='public'
          )
          print(f\"Video uploaded: {result['video_url']}\")
          "
          else
            # Scheduled run - use Google Sheets
            python automation_scheduler.py \
              --sheets-credentials google_sheets_credentials.json \
              --spreadsheet-id ${{ secrets.GOOGLE_SHEETS_ID }} \
              --youtube-secrets youtube_client_secrets.json \
              --max-videos 1
          fi
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: output/logs/
          retention-days: 7
      
      - name: Save YouTube token (if refreshed)
        if: always()
        run: |
          if [ -f youtube_token.pickle ]; then
            echo "YouTube token exists, encoding..."
            base64 youtube_token.pickle > youtube_token_new.txt
            echo "⚠️ YouTube token may have been refreshed"
            echo "If authentication fails, update YOUTUBE_TOKEN secret with content from artifact"
          fi
      
      - name: Upload YouTube token artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-token-${{ github.run_number }}
          path: youtube_token_new.txt
          retention-days: 7
