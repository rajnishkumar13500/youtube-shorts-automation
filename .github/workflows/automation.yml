name: YouTube Shorts Automation

on:
  schedule:
    # Run daily at 9 AM UTC (2:30 PM IST)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  generate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours maximum
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create credentials files from secrets
        run: |
          echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}' > google_sheets_credentials.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > youtube_client_secrets.json
      
      - name: Restore YouTube token (if exists)
        run: |
          if [ -n "${{ secrets.YOUTUBE_TOKEN_PICKLE }}" ]; then
            echo '${{ secrets.YOUTUBE_TOKEN_PICKLE }}' | base64 -d > youtube_token.pickle
            echo "✓ YouTube token restored"
          else
            echo "⚠ No YouTube token found - will need authentication"
          fi
      
      - name: Create .env file
        run: |
          cat << EOF > .env
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_2=${{ secrets.ELEVENLABS_API_KEY_2 }}
          ELEVENLABS_API_KEY_3=${{ secrets.ELEVENLABS_API_KEY_3 }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS=google_sheets_credentials.json
          GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}
          YOUTUBE_CLIENT_SECRETS=youtube_client_secrets.json
          EOF
      
      - name: Run automation (3 videos)
        run: |
          python automation_scheduler.py \
            --sheets-credentials google_sheets_credentials.json \
            --spreadsheet-id ${{ secrets.GOOGLE_SHEETS_ID }} \
            --youtube-secrets youtube_client_secrets.json \
            --max-videos 3
      
      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_number }}
          path: |
            *.log
            output/*.log
          retention-days: 7
      
      - name: Upload generated videos (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-videos-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
